    <style>
        /* --- Variáveis de Cores --- */
        :root {
            --cor-branco: #ffffff;
            --cor-roxo: #6633ff;
            --cor-azul-escuro: #000033;
        }

        /* --- Reset e Estilos Globais --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--cor-azul-escuro);
            color: var(--cor-branco);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Container Principal --- */
        .container {
            width: 100%;
            max-width: 450px;
            padding: 3rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.8s ease-out;
        }

        /* --- Perfil --- */
        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--cor-roxo);
            box-shadow: 0 4px 20px rgba(102, 51, 255, 0.4);
            margin-bottom: 1rem;
            transition: transform 0.3s ease;
        }

        .profile-pic:hover {
            transform: scale(1.05);
        }

        .username {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 2.5rem;
            letter-spacing: 0.5px;
        }

        /* --- Botões de Link --- */
        .links-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            padding: 1.1rem 1.5rem;
            background-color: var(--cor-roxo);
            color: var(--cor-branco);
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            border: 2px solid var(--cor-roxo);
            overflow: hidden;
        }

        .link-btn span {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 75%; /* Proteção padrão para o texto não tocar as extremidades */
            display: inline-block;
        }

        .link-btn svg {
            position: absolute;
            left: 1.5rem;
            width: 24px;
            height: 24px;
            fill: currentColor;
            z-index: 2;
        }

        /* Destaque para o evento */
        .link-btn.highlight {
            background: linear-gradient(135deg, var(--cor-roxo), #8a5cff);
            border-color: #8a5cff;
            box-shadow: 0 4px 15px rgba(102, 51, 255, 0.3);
        }

        .discount-badge {
            position: absolute;
            right: 1.5rem;
            background-color: var(--cor-branco);
            color: var(--cor-roxo);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 800;
            z-index: 2;
        }

        /* Efeito de Hover */
        .link-btn:hover {
            background-color: var(--cor-branco);
            color: var(--cor-azul-escuro);
            border-color: var(--cor-branco);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 255, 255, 0.15);
        }

        .link-btn.highlight:hover .discount-badge {
            background-color: var(--cor-roxo);
            color: var(--cor-branco);
        }

        /* --- Correção e Ajustes para Mobile --- */
        @media (max-width: 430px) {
            .link-btn span {
                max-width: 52%; /* Restringe a área do texto no mobile para forçar quebra de linha segura */
                font-size: 0.95rem;
            }

            .link-btn svg {
                left: 1rem; /* Aproxima ligeiramente o ícone da borda esquerda */
            }

            .discount-badge {
                right: 1rem; /* Aproxima ligeiramente o badge da borda direita */
                font-size: 0.7rem;
                padding: 0.2rem 0.5rem;
            }
        }

        /* --- Animação --- */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
